name = "together"
display_name = "Together AI"
category = "ai"
description = "Cloud platform for running and fine-tuning open-source LLMs with fast inference and custom training"
setup_url = "https://api.together.xyz/settings/api-keys"
revoke_url = "https://api.together.xyz/settings/api-keys"
free_tier = "$5 credit on signup"

[[env_vars]]
name = "TOGETHER_API_KEY"
sensitive = true

[validate]
method = "GET"
url = "https://api.together.xyz/v1/models"
auth = "Bearer"

[rotation]
strategy = "create-then-revoke"
programmatic = false
