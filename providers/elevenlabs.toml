name = "elevenlabs"
display_name = "ElevenLabs"
category = "ai"
description = "AI voice synthesis and text-to-speech API for realistic voice generation, cloning, and audio content"
setup_url = "https://elevenlabs.io/app/settings/api-keys"
revoke_url = "https://elevenlabs.io/app/settings/api-keys"
free_tier = "10,000 characters/month"

[[env_vars]]
name = "ELEVENLABS_API_KEY"
sensitive = true

[validate]
method = "GET"
url = "https://api.elevenlabs.io/v1/user"
auth = "xi-api-key"

[rotation]
strategy = "manual"
programmatic = false
