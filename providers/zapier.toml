name = "zapier"
display_name = "Zapier"
category = "devtools"
description = "Workflow automation platform for connecting apps with triggers, actions, and no-code integration pipelines"
setup_url = "https://nla.zapier.com/credentials/"
revoke_url = "https://nla.zapier.com/credentials/"
free_tier = "100 tasks/month"

[[env_vars]]
name = "ZAPIER_NLA_API_KEY"
sensitive = true

[validate]
method = "GET"
url = "https://nla.zapier.com/api/v1/configuration-link/"
auth = "X-API-Key"

[rotation]
strategy = "manual"
programmatic = false
