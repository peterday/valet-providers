name = "notion"
display_name = "Notion"
category = "devtools"
description = "Workspace API for pages, databases, blocks, comments, and knowledge management automation"
setup_url = "https://www.notion.so/my-integrations"
revoke_url = "https://www.notion.so/my-integrations"
free_tier = "Free personal plan; API access included"

[[env_vars]]
name = "NOTION_API_KEY"
prefixes = ["ntn_", "secret_"]
sensitive = true

[validate]
method = "GET"
url = "https://api.notion.com/v1/users/me"
auth = "Bearer"

[rotation]
strategy = "manual"
programmatic = false
warning = "Regenerating the integration secret invalidates the previous secret immediately"
