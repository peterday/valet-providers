name = "supabase"
display_name = "Supabase"
category = "database"
description = "Open-source Firebase alternative with PostgreSQL database, authentication, storage, and realtime subscriptions"
setup_url = "https://supabase.com/dashboard/project/_/settings/api"
revoke_url = "https://supabase.com/dashboard/project/_/settings/api"
free_tier = "2 free projects"

[[env_vars]]
name = "SUPABASE_URL"
sensitive = false

[[env_vars]]
name = "SUPABASE_PUBLISHABLE_KEY"
prefix = "sb_publishable_"
sensitive = false

[[env_vars]]
name = "SUPABASE_SECRET_KEY"
prefix = "sb_secret_"
sensitive = true

[[env_vars]]
name = "SUPABASE_ANON_KEY"
prefix = "eyJ"
sensitive = false
deprecated = true

[[env_vars]]
name = "SUPABASE_SERVICE_ROLE_KEY"
prefix = "eyJ"
sensitive = true
deprecated = true

[rotation]
strategy = "create-then-revoke"
programmatic = true
warning = "New keys support per-key rotation; legacy JWT keys still require nuclear rotation via JWT secret change"
